  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

karta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3d5c106e-63f8-4174-9512-0cbe8a13d50f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"14d9f19e-7f7b-4239-b907-4d62b9effbfe\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"cebb7598-7cc4-45d6-b705-e58072c840ce\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ff5bb307-08a6-453e-9eeb-c5e8ce080cdd\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3d5c106e-63f8-4174-9512-0cbe8a13d50f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   TopNotes — Shared Design System\n   Tokens + reusable component kit. Linked by every screen.\n   ============================================================ */\n\n/* ---------- Tokens ---------- */\n:root {\n  /* Brand */\n  --indigo-900: #2A2070;\n  --indigo-800: #3B2F8F;\n  --indigo-700: #4A3BB5;\n  --indigo-600: #5B4BE0;\n  --indigo-100: #DED9F7;\n  --indigo-50:  #EEEBFB;\n  --amber:      #F5A524;\n  --amber-700:  #B26A05;\n  --amber-soft: #FDECC8;\n  --amber-bg:   #FFF9EF;\n\n  /* Semantic */\n  --success: #16A34A;  --success-bg: #ECFDF3;  --success-line: #ABEFC6;\n  --danger:  #DC2626;  --danger-bg:  #FEF2F2;  --danger-line:  #FCDCDC;\n  --warning: #D97706;  --warning-bg: #FFFAEB;  --warning-line: #FEDF89;\n  --info:    #5B4BE0;  --info-bg:    #EEEBFB;\n\n  /* Neutrals */\n  --ink:     #0F1222;\n  --slate:   #475467;\n  --muted:   #98A2B3;\n  --line:    #EAECF0;\n  --line-2:  #D6DAE1;\n  --surface: #FFFFFF;\n  --canvas:  #F7F8FA;\n  --hover:   #F5F6F8;\n\n  /* Type scale */\n  --t-12: 12px; --t-14: 14px; --t-16: 16px;\n  --t-20: 20px; --t-24: 24px; --t-32: 32px; --t-40: 40px;\n\n  /* Radius */\n  --r-card: 12px; --r-ctrl: 8px; --r-pill: 999px;\n\n  /* Shadow */\n  --sh-xs: 0 1px 2px rgba(16,18,34,.06);\n  --sh-sm: 0 1px 2px rgba(16,18,34,.04), 0 2px 6px rgba(16,18,34,.05);\n  --sh-md: 0 1px 2px rgba(16,18,34,.04), 0 8px 24px rgba(16,18,34,.08);\n  --sh-lg: 0 1px 2px rgba(16,18,34,.04), 0 16px 40px rgba(16,18,34,.12);\n\n  --ring: 0 0 0 4px rgba(91,75,224,.22);\n  --ring-danger: 0 0 0 4px rgba(220,38,38,.18);\n  --ease: 180ms cubic-bezier(.4,0,.2,1);\n\n  --sidebar-w: 256px;\n  --sidebar-w-collapsed: 76px;\n  --topbar-h: 64px;\n}\n\n/* ---------- Base ---------- */\n* { box-sizing: border-box; }\nhtml, body { height: 100%; }\nbody {\n  margin: 0;\n  font-family: \"Plus Jakarta Sans\", system-ui, -apple-system, sans-serif;\n  color: var(--ink);\n  background: var(--canvas);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-size: var(--t-16);\n  line-height: 1.5;\n}\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: .001ms !important; transition-duration: .001ms !important; }\n}\nh1,h2,h3,h4 { margin: 0; letter-spacing: -.02em; }\na { color: var(--indigo-600); }\n::selection { background: var(--indigo-100); }\n\n/* ---------- Logo ---------- */\n.tn-logo {\n  display: inline-flex; align-items: center; gap: 10px;\n  color: var(--ink); text-decoration: none;\n  font-weight: 800; font-size: var(--t-20); letter-spacing: -.01em;\n}\n.tn-logo .mark {\n  width: 34px; height: 34px; border-radius: 9px;\n  display: grid; place-items: center;\n  background: linear-gradient(150deg, var(--indigo-600), var(--indigo-800));\n  color: #fff; font-weight: 800; font-size: var(--t-20);\n  box-shadow: var(--sh-xs);\n}\n.tn-logo .mark span { transform: translateY(-1px); }\n\n/* ============================================================\n   Buttons\n   ============================================================ */\n.btn {\n  position: relative;\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  font: inherit; font-weight: 700; font-size: var(--t-14);\n  height: 40px; padding: 0 18px;\n  border: 1px solid transparent; border-radius: var(--r-ctrl);\n  cursor: pointer; white-space: nowrap;\n  transition: background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease), box-shadow var(--ease);\n}\n.btn:active { transform: translateY(1px); }\n.btn:focus-visible { outline: none; box-shadow: var(--ring); }\n.btn:disabled { cursor: not-allowed; opacity: .55; pointer-events: none; }\n.btn svg { flex: none; }\n\n.btn-primary { background: var(--indigo-800); color: #fff; box-shadow: var(--sh-xs); }\n.btn-primary:hover { background: var(--indigo-900); }\n.btn-secondary { background: var(--surface); color: var(--ink); border-color: var(--line-2); box-shadow: var(--sh-xs); }\n.btn-secondary:hover { background: var(--hover); border-color: var(--muted); }\n.btn-ghost { background: transparent; color: var(--slate); }\n.btn-ghost:hover { background: var(--hover); color: var(--ink); }\n.btn-danger { background: var(--danger); color: #fff; box-shadow: var(--sh-xs); }\n.btn-danger:hover { background: #B42318; }\n.btn-amber { background: var(--amber); color: #3A2A05; box-shadow: var(--sh-xs); }\n.btn-amber:hover { background: #E3950F; }\n\n.btn-sm { height: 32px; padding: 0 12px; font-size: var(--t-12); }\n.btn-lg { height: 48px; padding: 0 24px; font-size: var(--t-16); }\n.btn-block { width: 100%; }\n.btn-icon { width: 40px; padding: 0; }\n.btn-icon.btn-sm { width: 32px; }\n\n/* loading */\n.btn[data-loading=\"1\"] { cursor: progress; color: transparent !important; }\n.btn[data-loading=\"1\"] .btn-spin { display: block; }\n.btn-spin {\n  display: none; position: absolute;\n  width: 18px; height: 18px;\n  border: 2px solid rgba(255,255,255,.45); border-top-color: #fff;\n  border-radius: 50%; animation: tn-spin .7s linear infinite;\n}\n.btn-secondary[data-loading=\"1\"] .btn-spin,\n.btn-ghost[data-loading=\"1\"] .btn-spin { border-color: rgba(71,84,103,.3); border-top-color: var(--slate); }\n@keyframes tn-spin { to { transform: rotate(360deg); } }\n\n/* ============================================================\n   Form controls\n   ============================================================ */\n.field { margin-bottom: 18px; }\n.label { display: block; font-size: var(--t-14); font-weight: 600; color: var(--ink); margin-bottom: 7px; }\n.label .opt { color: var(--muted); font-weight: 500; }\n.input-wrap { position: relative; }\n.input, .select, .textarea {\n  width: 100%; font: inherit; font-size: var(--t-16); color: var(--ink);\n  background: var(--surface); border: 1px solid var(--line-2);\n  border-radius: var(--r-ctrl);\n  transition: border-color var(--ease), box-shadow var(--ease);\n}\n.input, .select { height: 44px; padding: 0 14px; }\n.textarea { padding: 12px 14px; min-height: 96px; resize: vertical; line-height: 1.5; }\n.input::placeholder, .textarea::placeholder { color: var(--muted); }\n.input:hover, .select:hover, .textarea:hover { border-color: var(--muted); }\n.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--indigo-600); box-shadow: var(--ring); }\n.select {\n  appearance: none; cursor: pointer;\n  background-image: url(\"data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5 6 6.5l5-5' stroke='%2398A2B3' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\");\n  background-repeat: no-repeat; background-position: right 14px center; padding-right: 38px;\n}\n.field-err { display: none; margin-top: 7px; font-size: var(--t-12); color: var(--danger); }\n.field.invalid .input, .field.invalid .select, .field.invalid .textarea { border-color: var(--danger); }\n.field.invalid .input:focus, .field.invalid .textarea:focus { box-shadow: var(--ring-danger); }\n.field.invalid .field-err { display: block; }\n.field-hint { margin-top: 7px; font-size: var(--t-12); color: var(--muted); }\n\n/* search bar */\n.search {\n  position: relative; display: flex; align-items: center;\n}\n.search .input { padding-left: 42px; }\n.search .s-ic { position: absolute; left: 14px; color: var(--muted); pointer-events: none; display: grid; place-items: center; }\n\n/* ============================================================\n   Card\n   ============================================================ */\n.card {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: var(--r-card); box-shadow: var(--sh-sm);\n}\n.card-pad { padding: 24px; }\n\n/* ============================================================\n   Badge / Chip\n   ============================================================ */\n.badge {\n  display: inline-flex; align-items: center; gap: 5px;\n  font-size: var(--t-12); font-weight: 600; line-height: 1;\n  padding: 5px 10px; border-radius: var(--r-pill);\n  background: var(--canvas); color: var(--slate); border: 1px solid var(--line);\n}\n.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n.badge-indigo  { background: var(--indigo-50); color: var(--indigo-800); border-color: var(--indigo-100); }\n.badge-amber   { background: var(--amber-bg); color: var(--amber-700); border-color: var(--amber-soft); }\n.badge-success { background: var(--success-bg); color: #067647; border-color: var(--success-line); }\n.badge-danger  { background: var(--danger-bg); color: #B42318; border-color: var(--danger-line); }\n.badge-warning { background: var(--warning-bg); color: #B54708; border-color: var(--warning-line); }\n.badge-muted   { background: var(--canvas); color: var(--muted); border-color: var(--line); }\n\n.chip {\n  display: inline-flex; align-items: center; gap: 7px;\n  font-size: var(--t-14); font-weight: 600; color: var(--slate);\n  height: 38px; padding: 0 14px; border-radius: var(--r-pill);\n  background: var(--surface); border: 1px solid var(--line-2); cursor: pointer;\n  transition: var(--ease);\n}\n.chip:hover { border-color: var(--muted); background: var(--hover); }\n.chip[aria-pressed=\"true\"], .chip.active { background: var(--indigo-50); color: var(--indigo-800); border-color: var(--indigo-300, var(--indigo-100)); }\n.chip:focus-visible { outline: none; box-shadow: var(--ring); }\n.chip svg { color: var(--muted); }\n\n/* ============================================================\n   Avatar\n   ============================================================ */\n.avatar {\n  display: inline-grid; place-items: center;\n  width: 40px; height: 40px; border-radius: 50%;\n  background: var(--indigo-100); color: var(--indigo-800);\n  font-weight: 700; font-size: var(--t-14); flex: none; overflow: hidden;\n  user-select: none;\n}\n.avatar img { width: 100%; height: 100%; object-fit: cover; }\n.avatar-sm { width: 32px; height: 32px; font-size: var(--t-12); }\n.avatar-lg { width: 56px; height: 56px; font-size: var(--t-20 stroke-width=\"1.7\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><\u002Fsvg><span>Dash<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"upload\" href=\"#/upload\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Upload<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"my-notes\" href=\"#/my-notes\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 3h9l5 5v13H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Notes<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"earnings\" href=\"#/earnings\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 19V5m0 14h16M8 15l3-4 3 2 4-6\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Earn<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"mtab-section admin\">\n      <a class=\"mtab\" data-nav=\"admin\" href=\"#/admin\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"9\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Frect><\u002Fsvg><span>Home<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"users\" href=\"#/admin/users\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"9\" cy=\"8\" r=\"3.2\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M3.5 19a5.5 5.5 0 0 1 11 0\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span>Users<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"verifications\" href=\"#/admin/verifications\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2.5 4 6v5c0 5 3.5 8 8 9.5 4.5-1.5 8-4.5 8-9.5V6l-8-3.5Z\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Verify<\u002Fspan><\u002Fa>\n      <a class=\"mtab\" data-nav=\"config\" href=\"#/admin/config\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"3\" stroke=\"currentColor\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M12 2v3m0 14v3M2 12h3m14 0h3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span>Config<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===================== MODALS ===================== -->\n  <div class=\"modal-scrim\" id=\"rejectModal\">\n    <div class=\"modal\">\n      <div class=\"modal-head\"><h3>Reject verification<\u002Fh3><button class=\"x-btn\" onclick=\"TNApp.closeModals()\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6 6 18\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n      <div class=\"modal-body\">\n        <p class=\"slate\" style=\"font-size:14px;margin:0 0 16px;\">Rejecting <b id=\"rejectName\">this seller<\u002Fb>. Provide a reason — they'll see this and can re-submit.<\u002Fp>\n        <div class=\"field\"><label class=\"label\">Reason for rejection<\u002Flabel><textarea class=\"textarea\" id=\"rejectReason\" placeholder=\"e.g. Marksheet image is blurry / details don't match…\"><\u002Ftextarea><div class=\"field-err\">A reason is required.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"modal-foot\"><button class=\"btn btn-secondary\" onclick=\"TNApp.closeModals()\">Cancel<\u002Fbutton><button class=\"btn btn-danger\" id=\"rejectConfirm\">Reject seller<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"modal-scrim\" id=\"imgModal\">\n    <div class=\"modal img-modal\">\n      <div class=\"modal-head\"><h3>Marksheet<\u002Fh3><button class=\"x-btn\" onclick=\"TNApp.closeModals()\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6 6 18\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n      <div class=\"modal-body\"><div class=\"big-marksheet\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"modal-scrim\" id=\"addQModal\">\n    <div class=\"modal modal-lg\">\n      <div class=\"modal-head\"><h3>Add question<\u002Fh3><button class=\"x-btn\" onclick=\"TNApp.closeModals()\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6 6 18\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n      <div class=\"modal-body\">\n        <div class=\"field\"><label class=\"label\">Question<\u002Flabel><textarea class=\"textarea\" placeholder=\"Type the question…\"><\u002Ftextarea><\u002Fdiv>\n        <div class=\"field\"><label class=\"label\">Subject<\u002Flabel><select class=\"select\"><option>Chemistry<\u002Foption><option>Physics<\u002Foption><option>Maths<\u002Foption><option>Biology<\u002Foption><\u002Fselect><\u002Fdiv>\n        <label class=\"label\">Options &amp; correct answer<\u002Flabel>\n        <div id=\"optRows\">\n          ${['A','B','C','D'].map(k =&gt; `<label class=\"opt-row\" style=\"margin-bottom:8px;\"><input type=\"radio\" name=\"correct\"><span class=\"opt-key\">${k}<\u002Fspan><input class=\"input\" style=\"border:none;box-shadow:none;height:auto;\" placeholder=\"Option ${k}\"><\u002Flabel>`).join('')}\n        <\u002Fdiv>\n        <p class=\"field-hint\">Select the radio next to the correct option.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"modal-foot\"><button class=\"btn btn-secondary\" onclick=\"TNApp.closeModals()\">Cancel<\u002Fbutton><button class=\"btn btn-primary\" onclick=\"TNApp.closeModals();TNApp.toast('Question added','success')\">Add question<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"toast-stack\" id=\"toastStack\"><\u002Fdiv>\n\n  <!-- demo role switcher -->\n  <div class=\"demo\" role=\"group\" aria-label=\"Preview role\">\n    <span>Role<\u002Fspan>\n    <button type=\"button\" data-role=\"buyer\" aria-pressed=\"true\">Buyer<\u002Fbutton>\n    <button type=\"button\" data-role=\"seller\" aria-pressed=\"false\">Seller<\u002Fbutton>\n    <button type=\"button\" data-role=\"admin\" aria-pressed=\"false\">Admin<\u002Fbutton>\n  <\u002Fdiv>\n\n  <script src=\"8110992c-9fd8-4da1-b67e-b849c4b66dd5\"><\u002Fscript>\n  <script src=\"d94a2427-a66b-4eb5-b82e-d1a1d2d90fd1\"><\u002Fscript>\n  <script src=\"ff9c8e63-e40e-4fe2-8458-3f7174a0753c\"><\u002Fscript>\n  <script src=\"ac1d9c23-c266-4ca8-be98-4bf0103f23dd\"><\u002Fscript>\n  <script>\n  (function () {\n    const body = document.body;\n    const viewRoot = document.getElementById('viewRoot');\n    const viewerRoot = document.getElementById('viewerRoot');\n\n    const ROUTES = {\n      'browse':               { role: 'buyer',  nav: 'browse',        fn: () => Views.browse() },\n      'note':                 { role: 'buyer',  nav: 'browse',        fn: (a) => Views.note(a) },\n      'viewer':               { role: 'buyer',  full: true,           fn: (a) => Views.viewer(a) },\n      'purchases':            { role: 'buyer',  nav: 'purchases',     fn: () => Views.purchases() },\n      'seller':               { role: 'seller', nav: 'seller',        fn: () => Views.seller() },\n      'upload':               { role: 'seller', nav: 'upload',        fn: () => Views.upload() },\n      'my-notes':             { role: 'seller', nav: 'my-notes',      fn: () => Views.myNotes() },\n      'earnings':             { role: 'seller', nav: 'earnings',      fn: () => Views.earnings() },\n      'verification':         { role: 'seller', nav: null,            fn: () => Views.verification() },\n      'admin':                { role: 'admin',  nav: 'admin',         fn: () => Views.admin() },\n      'admin/users':          { role: 'admin',  nav: 'users',         fn: () => Views.adminUsers() },\n      'admin/verifications':  { role: 'admin',  nav: 'verifications', fn: () => Views.adminVerifications() },\n      'admin/test-manager':   { role: 'admin',  nav: 'test',          fn: () => Views.adminTest() },\n      'admin/config':         { role: 'admin',  nav: 'config',        fn: () => Views.adminConfig() },\n    };\n\n    function parseHash() {\n      let h = location.hash.replace(/^#\\/?/, '');\n      if (!h) return { key: 'browse', arg: null };\n      const seg = h.split('/');\n      if (seg[0] === 'admin' && seg[1]) return { key: 'admin/' + seg[1], arg: null };\n      if (seg[0] === 'note' || seg[0] === 'viewer') return { key: seg[0], arg: seg[1] };\n      return { key: seg[0], arg: seg[1] || null };\n    }\n\n    let current = 'browse';\n\n    function render() {\n      const { key, arg } = parseHash();\n      const route = ROUTES[key] || ROUTES['browse'];\n      current = key;\n\n      // role\n      body.dataset.role = route.role;\n      setIdentity(route.role);\n      syncRoleSwitcher(route.role);\n\n      if (route.full) {\n        // full-screen viewer\n        body.classList.add('viewer-mode');\n        document.getElementById('appRoot').style.display = 'none';\n        viewerRoot.innerHTML = route.fn(arg);\n        viewerRoot.style.display = 'block';\n        wireViewer();\n        window.scrollTo(0, 0);\n        return;\n      }\n      body.classList.remove('viewer-mode');\n      document.getElementById('appRoot').style.display = '';\n      viewerRoot.style.display = 'none';\n      viewerRoot.innerHTML = '';\n\n      viewRoot.innerHTML = route.fn(arg);\n      setActiveNav(route.nav);\n      document.querySelector('.main').scrollTop = 0;\n      closeDrawer();\n      wireView(key);\n    }\n\n    function setActiveNav(nav) {\n      document.querySelectorAll('.nav-item, .mtab').forEach(el => {\n        el.classList.toggle('active', el.dataset.nav === nav);\n      });\n    }\n\n    const IDENT = {\n      buyer:  { name: 'Aarav Sharma', email: 'aarav@topnotes.in', initials: 'AS', role: 'Buyer', badge: 'badge-indigo' },\n      seller: { name: 'Priya Nair',   email: 'priya@topnotes.in', initials: 'PN', role: 'Topper · Seller', badge: 'badge-amber' },\n      admin:  { name: 'Admin',        email: 'admin@topnotes.in', initials: 'AD', role: 'Administrator', badge: 'badge-success' },\n    };\n    function setIdentity(role) {\n      const p = IDENT[role];\n      topAvatar.textContent = p.initials; topName.textContent = p.name; topRole.textContent = p.role;\n      menuAvatar.textContent = p.initials; menuName.textContent = p.name; menuEmail.textContent = p.email;\n      menuRoleBadge.textContent = p.role; menuRoleBadge.className = 'badge menu-role ' + p.badge;\n    }\n    function syncRoleSwitcher(role) {\n      document.querySelectorAll('.demo button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.role === role)));\n    }\n\n    // ---------- per-view wiring ----------\n    function wireView(key) {\n      if (key === 'browse') {\n        const ft = document.getElementById('filterToggle');\n        if (ft) ft.addEventListener('click', () => TNApp.toast('Filter sheet would open on mobile', 'info'));\n      }\n      if (key === 'note') wireNote();\n      if (key === 'upload') wireUpload();\n    }\n\n    function wireNote() {\n      const buy = document.getElementById('buyBtn');\n      if (!buy) return;\n      buy.addEventListener('click', () => {\n        if (buy.dataset.loading === '1') return;\n        buy.dataset.loading = '1';\n        setTimeout(() => {\n          buy.dataset.loading = '0';\n          const id = buy.dataset.id;\n          buy.outerHTML = `<a class=\"btn btn-primary btn-lg btn-block\" style=\"background:var(--success);\" href=\"#/viewer/${id}\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-right:6px;\"><path d=\"M4 5.5C4 4.7 4.7 4 5.5 4H11v15H5.5A1.5 1.5 0 0 1 4 17.5v-12Z\" stroke=\"white\" stroke-width=\"1.6\"/><path d=\"M20 5.5C20 4.7 19.3 4 18.5 4H13v15h5.5a1.5 1.5 0 0 0 1.5-1.5v-12Z\" stroke=\"white\" stroke-width=\"1.6\"/><\u002Fsvg>Read notes<\u002Fa>`;\n          const wr = document.getElementById('writeReview');\n          if (wr) wr.style.display = 'block';\n          TNApp.toast('Purchase successful — happy studying!', 'success');\n        }, 1400);\n      });\n    }\n\n    function wireUpload() {\n      const dz = document.getElementById('dropzone');\n      const uf = document.getElementById('uploadFile');\n      const bar = document.getElementById('ufBar');\n      const pct = document.getElementById('ufPct');\n      if (dz) {\n        dz.addEventListener('click', simulateUpload);\n        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });\n        dz.addEventListener('dragleave', () => dz.classList.remove('drag'));\n        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); simulateUpload(); });\n      }\n      function simulateUpload() {\n        uf.style.display = 'flex'; let p = 0;\n        const t = setInterval(() => {\n          p += Math.random() * 18; if (p >= 100) { p = 100; clearInterval(t); TNApp.toast('PDF uploaded', 'success'); }\n          bar.style.width = p + '%'; pct.textContent = Math.round(p) + '%';\n        }, 160);\n      }\n      // live preview\n      const title = document.getElementById('uTitle');\n      const price = document.getElementById('uPrice');\n      const subject = document.getElementById('uSubject');\n      const exam = document.getElementById('uExam');\n      function updatePreview() {\n        const lp = document.getElementById('livePreview');\n        lp.innerHTML = TN.noteCard({ id:'preview', title: title.value || 'Your note title', subject: subject.value, exam: exam.value, cls:'Class 12', price: Number(price.value) || 0, pages: 0, rating: 0, reviews: 0, seller:{ name:'Priya Nair', initials:'PN' } }).replace('href=\"#/note/preview\"','href=\"javascript:void(0)\"');\n      }\n      [title, price, subject, exam].forEach(el => el && el.addEventListener('input', updatePreview));\n      [subject, exam].forEach(el => el && el.addEventListener('change', updatePreview));\n      const pub = document.getElementById('publishBtn');\n      if (pub) pub.addEventListener('click', () => {\n        if (pub.dataset.loading === '1') return;\n        pub.dataset.loading = '1';\n        setTimeout(() => { pub.dataset.loading = '0'; TNApp.toast('Note published to marketplace 🎉', 'success'); location.hash = '#/my-notes'; }, 1500);\n      });\n    }\n\n    function wireViewer() {\n      const total = parseInt(document.getElementById('vTotal').textContent, 10);\n      let page = 1;\n      const prev = document.getElementById('vPrev'), next = document.getElementById('vNext');\n      function upd() {\n        document.getElementById('vPage').textContent = page;\n        document.getElementById('vPage2').textContent = page;\n        prev.disabled = page <= 1; next.disabled = page >= total;\n      }\n      prev.addEventListener('click', () => { if (page > 1) { page--; upd(); } });\n      next.addEventListener('click', () => { if (page < total) { page++; upd(); } });\n      upd();\n    }\n\n    // ---------- chrome ----------\n    avatarBtn.addEventListener('click', e => { e.stopPropagation(); const o = avatarMenu.classList.contains('open'); closePops(); if (!o) avatarMenu.classList.add('open'); });\n    notifBtn.addEventListener('click', e => { e.stopPropagation(); const o = notifPanel.classList.contains('open'); closePops(); if (!o) notifPanel.classList.add('open'); });\n    document.addEventListener('click', e => { if (!avatarMenu.contains(e.target) && !notifPanel.contains(e.target)) closePops(); });\n    function closePops() { avatarMenu.classList.remove('open'); notifPanel.classList.remove('open'); }\n    document.getElementById('markRead').addEventListener('click', e => { e.preventDefault(); document.querySelectorAll('.notif.unread').forEach(n => n.classList.remove('unread')); document.getElementById('unreadDot').style.display = 'none'; });\n    document.getElementById('collapseBtn').addEventListener('click', () => { body.dataset.collapsed = body.dataset.collapsed === '1' ? '0' : '1'; });\n\n    const scrim = document.getElementById('scrim');\n    function openDrawer() { body.dataset.drawer = '1'; scrim.classList.add('open'); }\n    function closeDrawer() { body.dataset.drawer = '0'; scrim.classList.remove('open'); }\n    document.getElementById('hamburger').addEventListener('click', openDrawer);\n    scrim.addEventListener('click', closeDrawer);\n    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePops(); closeDrawer(); TNApp.closeModals(); } });\n\n    document.querySelectorAll('.demo button').forEach(btn => {\n      btn.addEventListener('click', () => {\n        const role = btn.dataset.role;\n        const landing = { buyer: '#/browse', seller: '#/seller', admin: '#/admin' }[role];\n        location.hash = landing;\n      });\n    });\n\n    // ---------- global app API ----------\n    window.TNApp = {\n      render,\n      toast(msg, type) {\n        const stack = document.getElementById('toastStack');\n        const el = document.createElement('div');\n        el.className = 'toast toast-' + (type || 'info');\n        const ic = type === 'success'\n          ? '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"m5 13 4 4L19 7\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>'\n          : type === 'danger'\n          ? '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6 6 18\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"/><\u002Fsvg>'\n          : '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"currentColor\" stroke-width=\"1.8\"/><path d=\"M12 11v5m0-8.5v.5\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>';\n        el.innerHTML = `<span class=\"t-ic\">${ic}<\u002Fspan><span>${msg}<\u002Fspan>`;\n        stack.appendChild(el);\n        setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; setTimeout(() => el.remove(), 200); }, 2800);\n      },\n      openReject(name) { document.getElementById('rejectName').textContent = name; document.getElementById('rejectModal').classList.add('open'); },\n      openImg() { document.getElementById('imgModal').classList.add('open'); },\n      openAddQ() { document.getElementById('addQModal').classList.add('open'); },\n      closeModals() { document.querySelectorAll('.modal-scrim').forEach(m => m.classList.remove('open')); },\n      updateSplit(v) {\n        v = Number(v);\n        document.getElementById('sbPlatform').style.width = v + '%';\n        document.getElementById('sbPlatform').textContent = v + '%';\n        document.getElementById('sbSeller').style.width = (100 - v) + '%';\n        document.getElementById('sbSeller').textContent = (100 - v) + '%';\n      },\n    };\n    document.querySelectorAll('.modal-scrim').forEach(m => m.addEventListener('click', e => { if (e.target === m) TNApp.closeModals(); }));\n    document.getElementById('rejectConfirm').addEventListener('click', () => {\n      const f = document.getElementById('rejectReason').closest('.field');\n      if (!document.getElementById('rejectReason').value.trim()) { f.classList.add('invalid'); return; }\n      const name = document.getElementById('rejectName').textContent;\n      TNApp.closeModals(); TNApp.toast(name + ' rejected', 'danger');\n    });\n\n    window.addEventListener('hashchange', render);\n    if (!location.hash) location.hash = '#/browse';\n    render();\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
