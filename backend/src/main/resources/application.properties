# ─── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# ─── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:topnotes_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:topnotes-super-secret-key-minimum-256-bits-long-2024}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# ─── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
app.file.max-pdf-size-bytes=52428800
app.file.max-image-size-bytes=5242880
app.file.allowed-pdf-types=application/pdf
app.file.allowed-image-types=image/jpeg,image/png,image/webp

# ─── Business Logic (config-driven) ───────────────────────────
app.business.platform-commission-percent=${PLATFORM_COMMISSION:35}
app.business.seller-commission-percent=${SELLER_COMMISSION:65}
app.business.test-pass-score-percent=${TEST_PASS_SCORE:70}
app.business.preview-pages=1
app.business.currency=INR

# ─── Payment / Razorpay ───────────────────────────────────────
# Add test/live keys to enable real Razorpay Checkout. Blank keys use local demo checkout.
payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
payment.razorpay.currency=INR

# ─── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200,http://127.0.0.1:4200}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# ─── Email ────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@topnotes.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
app.email.from=${MAIL_USERNAME:noreply@topnotes.com}
app.email.from-name=TopNotes Platform

# ─── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.topnotes=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Cloudinary Storage ───────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dzd3ufne6}
cloudinary.api-key=${CLOUDINARY_API_KEY:919386188755687}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

