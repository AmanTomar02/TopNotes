services:
  - type: web
    name: topnotes-backend
    runtime: docker
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: topnotes-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: topnotes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: topnotes-db
          property: password
      - key: FILE_UPLOAD_DIR
        value: /tmp/topnotes-uploads
      - key: FRONTEND_URL
        value: https://topnotes-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: web
    name: topnotes-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build:prod
    staticPublishPath: frontend/dist/topnotes-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: topnotes-db
    databaseName: topnotes
    user: topnotes
    plan: free
    region: singapore
    postgresMajorVersion: "17"
